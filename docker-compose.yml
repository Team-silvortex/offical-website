version: "3.9"

services:
  silvortex-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: silvortex-web
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
